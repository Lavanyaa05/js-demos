<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GitHub Profile Finder</title>

  <link rel="stylesheet" href="../styles.css">
</head>

<body>

  <main class="profile-page">

    <a class="back-link" href="../index.html">
      ← Back
    </a>

    <section class="profile-card">

      <h1>GitHub Profile Finder</h1>

      <p class="profile-description">
        Enter a GitHub username to view their public profile.
      </p>

      <form id="searchForm" class="profile-search">

        <input
          type="text"
          id="usernameInput"
          placeholder="Enter a GitHub username"
          autocomplete="off"
        >

        <button type="submit">
          Search
        </button>

      </form>

      <p id="profileMessage" class="profile-message">
        Try searching for octocat.
      </p>

      <div id="profileResult" class="profile-result">

        <div class="profile-placeholder">
          Profile information will appear here.
        </div>

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
