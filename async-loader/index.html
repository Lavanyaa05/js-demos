<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Study Tip Loader</title>

  <link rel="stylesheet" href="../styles.css">
</head>

<body>

  <main class="async-page">

    <a class="back-link" href="../index.html">
      ← Back
    </a>

    <section class="async-card">

      <h1>Study Tip Loader</h1>

      <p class="async-description">
        Get a random study tip after a short delay.
      </p>

      <div class="async-buttons">
        <button type="button" id="callbackButton">
          Load Tip
        </button>
      </div>

      <div id="tipBox" class="tip-box">
        Click the button to load a tip.
      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
