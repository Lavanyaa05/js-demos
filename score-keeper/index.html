<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Score Keeper</title>

  <link rel="stylesheet" href="../styles.css">
</head>

<body>

  <main class="score-page">

    <a class="back-link" href="../index.html">
      ← Back
    </a>

    <section class="score-card">

      <h1>Score Keeper</h1>

      <p class="score-description">
        Keep track of your score using the buttons below.
      </p>

      <p id="score" class="score-number">0</p>

      <div class="score-buttons">

        <button id="decreaseButton" type="button">
          −
        </button>

        <button id="resetButton" class="reset-button" type="button">
          Reset
        </button>

        <button id="increaseButton" type="button">
          +
        </button>

      </div>

      <p id="message" class="score-message">
        Start by changing the score.
      </p>

    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
